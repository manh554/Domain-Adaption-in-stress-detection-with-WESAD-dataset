MODEL:
  NAME: cdan_cnn
  METHOD: cdan
  BACKBONE: cnn
  HEAD_HIDDEN: 128
  HEAD_DROPOUT: 0.3
  DISC_HIDDEN: 256
  ENTROPY_CONDITIONING: true
  RANDOMIZED: false
DATA:
  LOADER: wesad_raw
TRAIN:
  EPOCHS: 60
  LR: 1.0e-3
  OPTIMIZER: adamw
  WEIGHT_DECAY: 1.0e-3
  LAMBDA_MAX: 0.3
  LAMBDA_WARMUP_EPOCHS: 5
  MODEL_SELECTION: last
